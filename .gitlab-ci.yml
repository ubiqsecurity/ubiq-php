# GitLab Security Scanning Templates
include:
    - template: Security/SAST.gitlab-ci.yml
    - template: Security/Secret-Detection.gitlab-ci.yml
    - template: Security/Dependency-Scanning.gitlab-ci.yml

image:
    name: debian:stable

variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Security scanning variables
    SAST_EXCLUDED_ANALYZERS: ""
    SECRET_DETECTION_EXCLUDED_PATHS: ""

stages:
    - test

# =============================================================================
# SECURITY SCANNING JOBS
# =============================================================================

sast:
    stage: test
    variables:
        SAST_EXCLUDED_PATHS: "vendor"

secret_detection:
    stage: test
    variables:
        SECRET_DETECTION_EXCLUDED_PATHS: "vendor/"

dependency_scanning:
    stage: test
    variables:
        DS_EXCLUDED_PATHS: "vendor"

test:
    stage: test
    before_script:
        - apt -y update
        - apt -y install composer make php-curl php-xdebug php-xml
        - composer install
        - export XDEBUG_MODE=coverage
    script:
        - make test
    artifacts:
        expire_in: 1 hour
        reports:
            codequality: phpcs.json
            coverage_report:
                coverage_format: cobertura
                path: phpunit-coverage.txt
    coverage: '/^\s*Lines:\s*\d+.\d+\%/'
